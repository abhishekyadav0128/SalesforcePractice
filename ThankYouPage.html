<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#00b4db,#0083b0);

}

.card{

width:500px;
max-width:90%;

background:white;

padding:50px;

border-radius:20px;

text-align:center;

box-shadow:0 20px 40px rgba(0,0,0,.2);

animation:popup .8s;

}

@keyframes popup{

from{

opacity:0;
transform:scale(.7);

}

to{

opacity:1;
transform:scale(1);

}

}

.icon{

font-size:80px;

color:#28a745;

margin-bottom:20px;

}

h1{

color:#28a745;

margin-bottom:15px;

font-size:40px;

}

h2{

color:#333;

margin-bottom:15px;

}

p{

color:#666;

line-height:25px;

margin-bottom:30px;

}

a{

display:inline-block;

padding:14px 30px;

background:#0083b0;

color:white;

text-decoration:none;

border-radius:8px;

transition:.3s;

font-weight:bold;

}

a:hover{

background:#005f80;

transform:translateY(-2px);

}

</style>

</head>

<body>

<div class="card">

<div class="icon">

<i class="fa-solid fa-circle-check"></i>

</div>

<h1>Thank You!</h1>

<h2>Lead Submitted Successfully</h2>

<p>

Your request has been received successfully.<br>

Our Salesforce team will contact you shortly.

</p>

<a href="index.html">

<i class="fa-solid fa-house"></i>

Back to Form

</a>

</div>

</body>

</html>
